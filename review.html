<!DOCTYPE html>
<html lang="ko" data-theme="bento">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>복습 · AI Study Hub</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/theme-bento.css">
<link rel="stylesheet" href="css/theme-dark.css">
<!-- KaTeX (수식 렌더링) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
<style>
  .review-layout { display:grid; grid-template-columns: 280px 1fr; gap:24px; align-items:start; }
  @media (max-width: 860px) { .review-layout { grid-template-columns: 1fr; } }

  .nav-side { position:sticky; top:16px; max-height: calc(100vh - 40px); overflow-y:auto; padding:16px; border:1px solid var(--c-border-soft); border-radius:14px; background:var(--c-surface); }
  .nav-side h3 { margin:0 0 8px; font-size:15px; color:var(--c-text-muted); }
  .nav-side ul { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:4px; }
  .nav-side a { display:block; padding:10px 12px; border-radius:8px; text-decoration:none; color:inherit; font-size:14px; border:1px solid transparent; }
  .nav-side a:hover { background:var(--c-border-soft); }
  .nav-side a.active { background:var(--c-accent); color:white; border-color:var(--c-accent); }

  .note-body { padding:24px; border:1px solid var(--c-border-soft); border-radius:14px; background:var(--c-surface); min-height: 400px; }
  .note-body h1 { margin-top:0; }
  .note-body h2 { margin-top:28px; padding-top:14px; border-top:1px solid var(--c-border-soft); }
  .note-body h3 { margin-top:20px; }
  .note-body pre { background:var(--c-code-bg, #f5f5f5); padding:12px 14px; border-radius:8px; overflow-x:auto; font-size:13px; }
  [data-theme="dark"] .note-body pre { background: rgba(255,255,255,0.05); }
  .note-body code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .note-body blockquote { border-left:4px solid var(--c-accent); margin:12px 0; padding:8px 16px; background:rgba(0,0,0,0.03); border-radius:4px; }
  [data-theme="dark"] .note-body blockquote { background: rgba(255,255,255,0.04); }
  .note-body table { border-collapse: collapse; margin:12px 0; width:100%; }
  .note-body th, .note-body td { border:1px solid var(--c-border-soft); padding:8px 10px; font-size:14px; }
  .note-body th { background: rgba(0,0,0,0.04); }
  [data-theme="dark"] .note-body th { background: rgba(255,255,255,0.06); }
  .note-body input[type="checkbox"] { width:16px; height:16px; margin-right:6px; vertical-align:middle; accent-color: var(--c-accent); }
  .note-body ul li { line-height:1.7; }

  .empty { text-align:center; padding:60px 20px; color:var(--c-text-muted); }
  .loading { text-align:center; padding:40px; color:var(--c-text-muted); }
</style>
</head>
<body>
<div class="page">

<header class="app-header">
  <div class="brand">
    <a href="index.html" style="text-decoration:none;color:inherit;">
      <div class="brand-title">AI Study Hub</div>
      <div class="brand-sub" id="crumb">← 홈</div>
    </a>
  </div>
  <div class="header-actions">
    <a class="btn btn-secondary" id="go-exam" href="#" style="display:none;">📝 모의고사</a>
    <button id="theme-toggle" class="btn-icon" aria-label="테마 전환" onclick="window.__theme.toggleTheme()">☾</button>
  </div>
</header>

<main class="container">

  <section class="hero" style="margin-bottom:12px;">
    <div class="hero-badge" id="hero-badge">📖 REVIEW</div>
    <h1 class="hero-title" id="hero-title">복습</h1>
    <p class="hero-sub" id="hero-sub">주차별 학습 노트</p>
  </section>

  <section class="review-layout">
    <aside class="nav-side">
      <h3>주차 목록</h3>
      <ul id="week-list"></ul>
    </aside>
    <article class="note-body" id="note-body">
      <div class="loading">왼쪽에서 주차를 선택하세요.</div>
    </article>
  </section>

</main>

</div>

<script type="module" src="js/theme.js"></script>
<!-- Marked (MD → HTML) -->
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<!-- KaTeX (수식) -->
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" integrity="sha384-43gviWU0YVjaDtb/GhzOouOXtZMP/7XUzwPTstBeZFe/+rCMvRwr4yROQP43s0Xk" crossorigin="anonymous"></script>
<script type="module" src="js/review.js"></script>

</body>
</html>
