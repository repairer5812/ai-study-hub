<!DOCTYPE html>
<html lang="ko" data-theme="bento">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="author" content="SW AI 융합정보대학원 61기 최경찬">
<meta name="description" content="AI Study Hub — 인공지능 스터디 허브 · 복습 + 모의고사 + 랭킹">
<meta property="og:title" content="AI Study Hub">
<meta property="og:description" content="인공지능 스터디 허브 · 과목별 복습 노트 + 모의고사">
<meta property="og:type" content="website">
<meta name="theme-color" content="#234E70">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<title>AI Study Hub</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/theme-bento.css">
<link rel="stylesheet" href="css/theme-dark.css">
<style>
  .hub-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); gap:20px; margin:24px 0; }
  .hub-card { position:relative; display:flex; flex-direction:column; gap:12px; padding:24px; border:1px solid var(--c-border-soft); border-radius:16px; background:var(--c-surface); text-decoration:none; color:inherit; transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease; }
  .hub-card:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(0,0,0,0.08); border-color:var(--c-accent); }
  .hub-card.locked { opacity:0.55; pointer-events:none; }
  .hub-card .emoji { font-size:40px; line-height:1; }
  .hub-card .title { font-size:20px; font-weight:700; }
  .hub-card .sub { color:var(--c-text-muted); font-size:14px; }
  .hub-card .actions { display:flex; gap:8px; margin-top:auto; }
  .hub-card .actions a { flex:1; text-align:center; padding:10px 12px; border-radius:10px; font-size:14px; font-weight:600; text-decoration:none; border:1px solid var(--c-border-soft); }
  .hub-card .actions a.primary { background:var(--c-accent); color:white; border-color:var(--c-accent); }
  .hub-card .actions a.ghost { background:transparent; color:var(--c-text); }
  .hub-card .actions a.disabled { opacity:0.45; pointer-events:none; }
  .hub-card .badge-wip { position:absolute; top:14px; right:14px; font-size:11px; padding:4px 8px; border-radius:10px; background:var(--c-border-soft); color:var(--c-text-muted); }
</style>
</head>
<body>
<div class="page">

<header class="app-header">
  <div class="brand">
    <div class="brand-title">AI Study Hub</div>
    <div class="brand-sub">복습 · 모의고사 · 랭킹</div>
  </div>
  <div class="header-actions">
    <button id="theme-toggle" class="btn-icon" aria-label="테마 전환" onclick="window.__theme.toggleTheme()">☾</button>
  </div>
</header>

<main class="container">

  <section class="hero">
    <div class="hero-badge">AI STUDY · 2026</div>
    <h1 class="hero-title">과목을 선택하세요</h1>
    <p class="hero-sub">학습 노트 복습 · 모의고사 풀이 · 실시간 랭킹</p>
  </section>

  <section class="hub-grid" id="hub-grid">
    <!-- JS 렌더 -->
  </section>

  <section style="margin-top:56px; padding:24px; border-top:1px dashed var(--c-border-soft); text-align:center;">
    <div class="muted small">
      SW AI 융합정보대학원 61기 최경찬 · <a href="mailto:repairer5812@gmail.com" style="color:inherit;text-decoration:underline;">repairer5812@gmail.com</a><br>
      학습 목적 비영리 프로젝트 · 문제는 강의 노트·슬라이드 기반으로 작성된 복습용 연습 문제입니다
    </div>
  </section>

</main>

</div>

<script type="module" src="js/theme.js"></script>
<script type="module">
  import { getAllSubjectMetas } from "./js/subjects/index.js";

  const grid = document.getElementById("hub-grid");
  const metas = getAllSubjectMetas();

  grid.innerHTML = metas.map(m => {
    const locked = !m.available;
    const examHref = m.hasExam ? `subject.html?s=${m.id}` : "#";
    const reviewHref = m.noteIndex.length ? `review.html?s=${m.id}` : "#";
    const examClass = m.hasExam ? "primary" : "primary disabled";
    const reviewClass = m.noteIndex.length ? "ghost" : "ghost disabled";
    const wipText = locked ? "자료 준비중" : (m.hasExam ? "" : "시험 준비중");
    return `
      <div class="hub-card ${locked ? "locked" : ""}" data-review="${reviewHref}" role="group" aria-label="${m.title}">
        ${wipText ? `<span class="badge-wip">${wipText}</span>` : ""}
        <span class="emoji">${m.emoji}</span>
        <div class="title">${m.title}</div>
        <div class="sub">${m.subtitle}</div>
        <div class="actions">
          <a class="${reviewClass}" href="${reviewHref}">📖 복습</a>
          <a class="${examClass}" href="${examHref}">📝 모의고사</a>
        </div>
      </div>`;
  }).join("");

  // 카드 본체(버튼 외 영역) 클릭 시 복습으로 이동
  grid.querySelectorAll(".hub-card").forEach(card => {
    card.addEventListener("click", (e) => {
      if (e.target.closest("a")) return;                  // 버튼 클릭은 기본 동작 유지
      const href = card.dataset.review;
      if (href && href !== "#" && !card.classList.contains("locked")) location.href = href;
    });
  });
</script>

</body>
</html>
